<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Source+Sans+3:wght@400&amp;display=swap');
      .fan-rescue {
        font-family: 'Archivo Black', sans-serif;
        font-weight: 900;
        fill: #C8973E;
        letter-spacing: 0.12em;
      }
      .established {
        font-family: 'Source Sans 3', sans-serif;
        font-weight: 400;
        fill: #E8D5A3;
        letter-spacing: 0.25em;
      }
    </style>
  </defs>
  <text x="60" y="200" class="fan-rescue" font-size="110">FAN</text>
  <text x="60" y="320" class="fan-rescue" font-size="110">RESCUE</text>
  <text x="62" y="400" class="established" font-size="38">— ESTABLISHED 2005 —</text>
</svg>
